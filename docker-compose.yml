x-common-env: &common-env
  COMMUNITY_DB_PASSWORD: 123456
  COMMUNITY_REDIS_PASSWORD: 123456
  COMMUNITY_JWT_SECRET: docker-dev-secret-not-for-production
  COMMUNITY_MINIO_ACCESS_KEY: minioadmin
  COMMUNITY_MINIO_SECRET_KEY: minioadmin
  SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
  SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
  SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: nacos
  SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: nacos
  SPRING_CLOUD_NACOS_CONFIG_USERNAME: nacos
  SPRING_CLOUD_NACOS_CONFIG_PASSWORD: nacos

services:
  # ==================== MySQL 8.0 ====================
  mysql:
    image: mysql:8.0
    container_name: community-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: community_platform
    ports:
      - "3308:3306"
    volumes:
      - community-mysql-data:/var/lib/mysql
      - ./docs/ddl.sql:/docker-entrypoint-initdb.d/01-init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --innodb-buffer-pool-size=128M
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - community-net

  # ==================== Redis 7 ====================
  redis:
    image: redis:7-alpine
    container_name: community-redis
    ports:
      - "6381:6379"
    volumes:
      - community-redis-data:/data
    command: redis-server --requirepass 123456 --appendonly yes
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - community-net

  # ==================== Nacos ====================
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: community-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789
      NACOS_AUTH_IDENTITY_KEY: community-platform
      NACOS_AUTH_IDENTITY_VALUE: community-platform-docker
      JVM_XMS: 256m
      JVM_XMX: 256m
    mem_limit: 512m
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8848/nacos/v1/console/health/readiness | grep -qi ok || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - community-net

  # ==================== Nacos 初始化 ====================
  nacos-init:
    image: curlimages/curl:latest
    container_name: community-nacos-init
    mem_limit: 128m
    depends_on:
      nacos:
        condition: service_healthy
    volumes:
      - ./docs/nacos-shared-config.yaml:/config.yaml:ro
    command:
      - sh
      - -c
      - |
        echo "=== Nacos Init: Authenticating ==="
        AUTH_RESP=$$(curl -s -X POST "http://nacos:8848/nacos/v1/auth/login" \
          -d "username=nacos" \
          -d "password=nacos")
        ACCESS_TOKEN=$$(echo "$$AUTH_RESP" | grep -o '"accessToken":"[^"]*"' | cut -d'"' -f4)
        if [ -z "$$ACCESS_TOKEN" ]; then
          echo "ERROR: Failed to get Nacos access token"
          exit 1
        fi
        echo "=== Nacos Init: Publishing shared config ==="
        sleep 5
        for i in 1 2 3 4 5; do
          HTTP_CODE=$$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "http://nacos:8848/nacos/v1/cs/configs?accessToken=$$ACCESS_TOKEN" \
            -d "dataId=community-platform-common.yaml" \
            -d "group=DEFAULT_GROUP" \
            -d "type=yaml" \
            --data-urlencode "content@/config.yaml")
          if [ "$$HTTP_CODE" = "200" ]; then
            echo "=== Shared config published successfully ==="
            exit 0
          fi
          echo "Retry $$i/5 (HTTP $$HTTP_CODE)..."
          sleep 3
        done
        echo "ERROR: Failed to publish config after 5 retries"
        exit 1
    networks:
      - community-net

  # ==================== MinIO ====================
  minio:
    image: minio/minio:latest
    container_name: community-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9004:9000"
      - "9005:9001"
    volumes:
      - community-minio-data:/data
    command: server /data --console-address ":9001"
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - community-net

  # ==================== RocketMQ NameServer ====================
  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: community-rocketmq-namesrv
    environment:
      JAVA_OPT: "-Xms128m -Xmx256m -server"
    command: sh mqnamesrv
    mem_limit: 384m
    ports:
      - "9878:9876"
    networks:
      - community-net

  # ==================== RocketMQ Broker ====================
  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: community-rocketmq-broker
    environment:
      JAVA_OPT: "-Xms256m -Xmx512m -server -XX:+UseG1GC"
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/conf/broker.conf
    mem_limit: 1g
    ports:
      - "10919:10909"
      - "10911:10911"
    volumes:
      - ./broker.conf:/home/rocketmq/conf/broker.conf
    networks:
      - community-net

  # ==================== Elasticsearch :9200 ====================
  elasticsearch:
    image: elasticsearch:8.15
    build:
      context: .
      dockerfile: elasticsearch.Dockerfile
    container_name: community-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    mem_limit: 1g
    ports:
      - "9200:9200"
    volumes:
      - community-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - community-net

  # ==================== Gateway :8080 ====================
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: community-gateway
    container_name: community-gateway
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
    mem_limit: 384m
    depends_on:
      nacos-init:
        condition: service_completed_successfully
    networks:
      - community-net

  # ==================== User Service :8081 ====================
  user-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: community-user-service
    container_name: community-user-service
    ports:
      - "8081:8081"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
    mem_limit: 384m
    depends_on:
      nacos-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - community-net

  # ==================== Server Service :8082 ====================
  server-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: community-server-service
    container_name: community-server-service
    ports:
      - "8082:8082"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
    mem_limit: 384m
    depends_on:
      nacos-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - community-net

  # ==================== Message Service :8083 ====================
  message-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: community-message-service
    container_name: community-message-service
    ports:
      - "8083:8083"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m"
    mem_limit: 512m
    depends_on:
      nacos-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - community-net

  # ==================== File Service :8084 ====================
  file-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: community-file-service
    container_name: community-file-service
    ports:
      - "8084:8084"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
    mem_limit: 384m
    depends_on:
      nacos-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - community-net

  # ==================== WebSocket :8091 ====================
  websocket:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: community-websocket
    container_name: community-websocket
    ports:
      - "8091:8091"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m"
    mem_limit: 512m
    depends_on:
      nacos-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - community-net

volumes:
  community-mysql-data:
  community-redis-data:
  community-minio-data:
  community-es-data:

networks:
  community-net:
    driver: bridge

# ponytail: Gateway 只需要 JWT secret + Nacos 地址，无 DB/Redis
community:
  jwt:
    secret: docker-dev-secret-not-for-production

spring:
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
      config:
        server-addr: nacos:8848

logging:
  level:
    root: INFO
    com.community: DEBUG

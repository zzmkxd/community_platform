name: Build & Publish

on:
  push:
    branches: [main, zjwSpringCloud, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  # ==================== Job 1: 编译检查 ====================
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn compile -pl community-server -am -B

  # ==================== Job 2: 打包 + Docker 镜像发布 ====================
  build-and-push:
    needs: compile
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Package JAR
        run: mvn package -pl community-server -am -DskipTests -B

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/zzmkxd/community-platform:latest
